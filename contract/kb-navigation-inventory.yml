- id: 24ba6c131afba57b
  language: en
  page: manuals:server:secondary_dns
  paragraph: 5
  text: "===== TSIG ===== Zone transfers between primary and secondary servers can
    be further secured using TSIG. First, create a shared key in the menu DNS -> TSIG
    keys. Each key is identified by an arbitrary name, chosen algorithm, and secret
    code. These values must match on all servers. When adding primary servers to a
    zone, you can set the selected TSIG key. The sample configuration again shows
    how to set up TSIG on the primary server."
