- id: ea064d9d5b891798
  language: en
  page: information:support
  paragraph: 2
  text: "- **Check** that the problem really isn’t on your side, so that you don’t
    bother the support with unnecessary requests. - If the problem is on your side
    and not even Google can help you, write to our [[https://discourse.vpsfree.cz/t/welcome-to-vpsfree-cz-discourse/5|Discourse]]
    or [[chat|chat]] and **ask others** for advice. - Our support uses the email address
    [[mailto:support@vpsfree.org|support@vpsfree.org]]. **Email is not like text messaging
    on your phone** – don’t write short messages, describe your problem in detail.
    - Each email needs to have a clear **subject** where you summarize your problem.
    So don’t use subjects like “Problem”, but rather “VPS not Starting” or “Assigning
    PTR record”. - If you’re writing a longer email, make logical **paragraphs** in
    the text in order to make reading it easier. - Add your **member ID** or and your
    **VPS ID** to the email. This helps us identify the sender and find the problem.
    - You can address us by our first names in emails – we all use our first names
    in vpsFree.cz. We will automatically use your first name to address you, so please
    don’t be offended."
  reason: Broad lexical match is not a vpsAdmin WebUI navigation instruction.
