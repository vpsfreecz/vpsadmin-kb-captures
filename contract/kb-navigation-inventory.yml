  language: en
  page: manuals:server:primary_dns
  paragraph: 4
  text: "===== DNSSEC ===== We support DNSSEC, but to set it up, you need to pass
    the DNSKEY/DS record to the parent zone, check with your registrar as to how it
    is done. DNSSEC is activated in the zone details in vpsAdmin, and the keys are
    automatically generated and the zone is signed; we use the default BIND policy.
    You can view the DNSKEY/DS records by clicking on **View DNSKEY and DS records**
    in the zone details."
  reason: Existing WebUI reference outside the localized navigation-label set; inventoried
