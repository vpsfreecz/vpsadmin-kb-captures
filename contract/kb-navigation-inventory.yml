- id: b3e817258e6177c5
  language: cs
  page: navody:distribuce:nixos:impermanence
  paragraph: 8
  text: "==== 2. Spuštění VPS v rescue módu ==== V detailu VPS použijte formulář **Spustit
    VPS ze šablony (nouzový režim)**. Nejlepší je vybrat jinou distribuci než NixOS,
    aby zde nebyl adresář ''/nix''. Použijte např. Alpine nebo Debian."
  paths:
  - vps.boot-rescue.open
- id: c028c8b05ce8af54
  language: cs
  page: navody:distribuce:nixos:impermanence
  paragraph: 18
  text: "==== 8. Zapnutí funkce impermanence ==== V detailu VPS ve formuláři **Funkce**
    zapněte funkci **NixOS Impermanence**. To nakonfiguruje VPS tak, aby při startu
    používal čistý, dočasný dataset. Jeho obsah bude při každém restartu ztracen a
    není zálohován. Zapnutí této funkce způsobí restart VPS do konfigurace, kterou
    jsme připravili v kroku **7**."
  paths:
  - vps.features.open
- id: e26d1c4e22b5e74b
  language: cs
  page: navody:distribuce:nixos:impermanence
  paragraph: 11
  text: "==== 5. Připojení root datasetu do /persistent ==== V režimu impermanence
    bude váš kořenový souborový systém dočasný a při každém startu vymazán. Naše trvalé
    úložiště připojíme do ''/persistent''. Může to být root dataset, nebo můžete vytvořit
    další subdataset pro tento účel. Zde použijeme root dataset. V detailu VPS klikněte
    na odkaz **Mount** u prvního uvedeného datasetu (jeho název je ID VPS) a připojte
    ho do ''/persistent''."
  paths:
  - datasets.mount.open
- id: ff6424ee5947162c
  language: cs
  page: navody:distribuce:nixos:impermanence
  paragraph: 9
  text: "==== 3. Vytvoření VPS subdatasetu pro Nix store ==== V detailu VPS vytvořte
    subdataset ''nix'', který bude připojen na ''/nix'' (proto jsme v předchozím kroku
    nechtěli bootovat do NixOS). Možná budete muset uvolnit nějaké místo na disku,
    abyste mohli vytvořit dataset, což lze provést zmenšením root datasetu."
  reason: Broad lexical match is not a vpsAdmin WebUI navigation instruction.
