- id: 1a7d63f34a803a97
  language: cs
  page: navody:server:primarni_dns
  paragraph: 4
  text: "===== DNSSEC ===== DNSSEC podporujeme, pro nastavení však musíš předat DNSKEY/DS
    záznam nadřazené zóně, o postupu se informuj u svého registrátora. DNSSEC se aktivuje
    v detailu zóny ve vpsAdminu, klíče jsou automaticky vygenerovány a zóna podepsána;
    používáme výchozí politiku BINDu. DNSKEY/DS záznamy si zobrazíš kliknutím na **Zobrazit
    záznamy DNSKEY a DS** v detailu zóny."
  reason: Existing WebUI reference outside the localized navigation-label set; inventoried
    for future semantic binding.
- id: 4a7962206f511ddd
  language: cs
  page: navody:server:primarni_dns
  paragraph: 5
  text: "===== Vlastní sekundární servery ===== Ve VPS si můžeš spustit vlastní DNS
    server a použít ho jako další sekundární server. Ve vpsAdminu jej přidáš v detailu
    zóny přes formulář **Sekundární servery**. vpsAdmin ti pak ukáže, jak by mohla
    vypadat jeho konfigurace. Až budeš mít server funkční, můžeš ho u registrátora
    domény přidat mezi nameservery."
  reason: Existing WebUI reference outside the localized navigation-label set; inventoried
    for future semantic binding.
- id: 9a6b2af18e511372
  language: cs
  page: navody:server:primarni_dns
  paragraph: 1
  text: "- V menu **DNS** -> **Primární zóny** si vytvoříš zónu pro tvou doménu. Název
    zóny je jednoduše název domény, tj. nejčastěji doména druhého řádu. Můžeš však
    delegovat i domény vyšších řádů. - U registrátora domény je potřeba přenastavit
    nameservery na naše sdílené, přidělené servery uvidíš v detailu zóny (např. //ns3.vpsfree.cz//
    a //ns4.vpsfree.cz//). - DNS záznamy dále nastavuješ přes rozhraní vpsAdminu."
  paths:
  - dns.primary-zones.open
- id: 31189185490c3ad0
  language: cs
  page: navody:server:sekundarni_dns
  paragraph: 5
  text: "===== TSIG ===== Přenos zón mezi primárními a sekundárními servery lze dále
    zabezpečit pomocí TSIG. V menu DNS -> TSIG klíče si nejprve vytvoříme sdílený
    klíč. Každý klíč je identifikován libovolným názvem, zvoleným algoritmem a tajným
    kódem. Tyto hodnoty se musí shodovat na všech serverech. Při přidávání primárních
    serverů k zóně můžeme nastavit vybraný TSIG klíč. V ukázkové konfiguraci je opět
    znázorněno, jak TSIG nastavit na primárním serveru."
  paths:
  - dns.tsig-keys.open
