  language: en
  page: manuals:server:primary_dns
  paragraph: 1
  text: "- In the **DNS** -> **Primary zones** menu, create a zone for your domain.
    The zone name is simply the domain name, usually a second-level domain, but you
    can delegate higher-level domains as well. - You need to update the nameservers
    with your domain registrar to our shared servers, which you will see in the zone
    details (e.g., //ns3.vpsfree.cz// and //ns4.vpsfree.cz//). - You can then manage
    the DNS records through the vpsAdmin interface."
