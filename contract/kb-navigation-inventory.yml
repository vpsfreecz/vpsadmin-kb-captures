- id: ee66aafaa73394f1
  language: cs
  page: navody:server:sekundarni_dns
  text: "===== TSIG ===== Přenos zón mezi primárními a sekundárními servery lze dále
    zabezpečit pomocí TSIG. V menu DNS -> TSIG klíče si nejprve vytvoříme sdílený
    klíč. Každý klíč je identifikován libovolným názvem, zvoleným algoritmem a tajným
    kódem. Tyto hodnoty se musí shodovat na všech serverech. Při přidávání primárních
    serverů k zóně můžeme nastavit vybraný TSIG klíč. V ukázkové konfiguraci je opět
    znázorněno, jak TSIG nastavit na primárním serveru."
  paths:
  - dns.tsig-keys.open
