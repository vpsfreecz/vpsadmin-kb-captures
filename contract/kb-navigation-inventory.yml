- id: d601130e3d0011af
  language: en
  page: manuals:vps:vpsadminos
  text: "===== About vpsAdminOS ===== vpsAdminOS is a spin of NixOS. The host system
    is rather small and includes only management services, as it focuses on running
    everything else in Linux system containers. vpsAdminOS is interconnected with
    vpsAdmin, our control panel. It is however also usable outside of vpsFree.cz's
    infrastructure, e.g. on your home server."
  reason: Mentions WebUI content or an unlocalized control, not a navigation label
    changed by this release.
