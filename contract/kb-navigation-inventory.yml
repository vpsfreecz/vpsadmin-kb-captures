  text: You can setup TOTP e.g. on your mobile phone using applications like [[https://play.google.com/store/apps/details?id=com.google.android.apps.authenticator2|Google
    Authenticator]] or [[https://freeotp.github.io|FreeOTP]]. vpsAdmin will show you
    a QR code which you scan into the application. The 2FA activation is then confirmed
    when you enter the one-time password that the application will show you. Alternatively,
    instead of scanning the QR code, you can enter the secret key manually.
  reason: Mentions WebUI content or an unlocalized control, not a navigation label
    changed by this release.
