  language: cs
  page: navody:server:primarni_dns
  text: "===== DNSSEC ===== DNSSEC podporujeme, pro nastavení však musíš předat DNSKEY/DS
    záznam nadřazené zóně, o postupu se informuj u svého registrátora. DNSSEC se aktivuje
