- id: c712550abe9f13a5
  language: cs
  page: informace:vymena_ip
  paragraph: 6
  text: Nové adresy byly do VPS naroutovány, o jaké adresy se jedná zjistíš z mailu,
    který jsme ti poslali. Pokud jsi žádný mail nedostal a nemáš žádnou IP z rozsahů
    uvedených výše, výměna se tě netýká. Až budeš chtít výměnu provést, nové adresy
    v detailu VPS ve vpsAdminu přidej na síťové rozhraní pomocí formuláře „Adresy
    rozhraní“. Na rozhraní můžeš mít více adres a výměnu tak provádět postupně. Až
    původní adresy nebudou potřeba, pomocí stejného formuláře ve vpsAdminu je můžeš
    z VPS odstranit.
  reason: Existing WebUI reference outside the localized navigation-label set; inventoried
