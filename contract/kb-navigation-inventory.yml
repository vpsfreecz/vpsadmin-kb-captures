- id: ffc6728df1b6376f
  language: cs
  page: informace:db_spravcu
  text: "===== Jaromír Dvořáček a ServerNaMiru.cz ===== * Jako původně **systémák**
    a následně **projekťák** podporuji týmy vývojářů už 10+ let. Zaměřuji se na pochopení
    reálných byznysových potřeb a nejkratší cestu k cíli. Vedu stabilní a dlouhodobě
    odladěný tým — s námi **za cenu jednotlivce získáte zastupitelnost** a širší škálu
    schopností. * spravujeme: AWS, CentOS, Debian, Ubuntu a [[https://muj.servernamiru.cz/technologie/|komplet
    prostředí pro vývojáře]] (docker, gitlab, jenkins, mariadb, elasticsearch, mongodb,
    redis, hadoop, nginx, haproxy, php-fpm, zabbix, ansible) * zkušenosti: HA systémy,
    deployment, automatizace, orchestrace, detailní monitoring, více-kanálové zálohy,
    optimalizace * reference: [[https://muj.servernamiru.cz/reference/|naši klienti
    oceňují]] bezproblémovou komunikaci, dodržování termínů a rozpočtů * hodinovka
    950 Kč a [[https://muj.servernamiru.cz/sluzby-a-ceny/|měsíční paušály]] * kontakty:
    [[https://muj.servernamiru.cz/kontakty/|Server na míru]], [[vas@servernamiru.cz]]"
  reason: Broad lexical match is not a vpsAdmin WebUI navigation instruction.
