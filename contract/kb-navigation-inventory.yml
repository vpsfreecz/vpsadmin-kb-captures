- id: 5a37f1497fca3a3e
  language: en
  page: manuals:distributions:nixos:impermanence
  paragraph: 18
  text: "==== 8. Turn on impermanence feature ==== In VPS details, enable the **NixOS
    Impermanence** feature. This will configure your VPS so that it is started with
    a clean, temporary dataset. Its contents will be lost on every reboot and it's
    not backed up. Turning on the feature will cause the VPS to restart into the configuration
    we've prepared in step **7**."
  reason: Broad lexical match is not a vpsAdmin WebUI navigation instruction.
- id: 7b098ad283fd3d4b
  language: en
  page: manuals:distributions:nixos:impermanence
  paragraph: 8
  text: "==== 2. Start the VPS in rescue mode ==== In VPS details, use form **Boot
    VPS from template (rescue mode)**. It's best to choose a different distribution
    than NixOS, so that there's no ''/nix'' directory. Use e.g. Alpine or Debian."
  paths:
  - vps.boot-rescue.open
- id: 99e0a207d925d665
  language: en
  page: manuals:distributions:nixos:impermanence
  paragraph: 9
  text: "==== 3. Create VPS subdataset for the Nix store ==== In VPS details, create
    subdataset ''nix'', which will be mounted to ''/nix'' (this is why we didn't want
    to boot into NixOS in the previous step). You might have to free some diskspace
    in order to be able to create the dataset, you can do that by shrinking the root
    dataset."
  reason: Broad lexical match is not a vpsAdmin WebUI navigation instruction.
- id: c6f2cccc09a24e18
  language: en
  page: manuals:distributions:nixos:impermanence
  paragraph: 11
  text: "==== 5. Mount root dataset to /persistent ==== In the impermanence mode,
    your root file system will be temporary and cleared on every start. We must mount
    our persistent storage to ''/persistent''. This can be either the root dataset,
    or you can create another subdataset for that purpose. We'll use the root dataset.
    In VPS details, click on **Mount** link of the first listed dataset (its name
    is the VPS ID) and mount it to ''/persistent''."
  paths:
  - datasets.mount.open
